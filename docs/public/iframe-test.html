<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Iframe Preview Test Page</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        box-sizing: border-box;
      }
      .card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.18);
        max-width: 480px;
      }
      h1 {
        margin-top: 0;
        color: #409eff;
        font-size: 24px;
      }
      p {
        color: #666;
        line-height: 1.6;
        font-size: 14px;
      }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        background-color: #e1f3d8;
        color: #67c23a;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">Iframe Preview</div>
      <h1>内置网页测试页面</h1>
      <p>这是一个用于测试 YhAiArtifacts 组件中 iframe 网页预览功能的本地域文件。</p>
      <p
        >通过使用同域的测试文件，可以完美规避由于第三方网站设置的
        <code>X-Frame-Options</code> 响应头或跨域安全策略（CORS）所导致的渲染拦截问题。</p
      >
    </div>
  </body>
</html>
