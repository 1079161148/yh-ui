name: Release & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to release (branch, commit, or tag)'
        required: true
        default: 'main'
      publish_to_npm:
        description: 'Publish packages to npm'
        required: true
        type: boolean
        default: true
      deploy_docs:
        description: 'Deploy docs after publish'
        required: true
        type: boolean
        default: true

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  NODE_OPTIONS: '--max-old-space-size=6144'

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Verify packages and docs build
        run: pnpm verify:release

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name != 'workflow_dispatch' || inputs.publish_to_npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Extract release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish packages to npm
        run: pnpm publish:all
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_REGISTRY_URL: 'https://registry.npmjs.org'

      - name: Create or update GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.VERSION }}'
            const tagName = `v${tag}`
            const targetCommitish = '${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}'
            const body = `## YH-UI v${tag}\n\n📦 [npm package](https://www.npmjs.com/package/@yh-ui/yh-ui)\n📉 [Documentation](https://1079161148.github.io/yh-ui/)\n\nSee [CHANGELOG.md](./CHANGELOG.md) for full details.`

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName
              })

              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
                tag_name: tagName,
                name: tagName,
                body,
                draft: false,
                prerelease: tag.includes('-')
              })
            } catch (error) {
              if (error.status !== 404) throw error

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                target_commitish: targetCommitish,
                name: tagName,
                body,
                draft: false,
                prerelease: tag.includes('-')
              })
            }

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.event_name != 'workflow_dispatch' || inputs.deploy_docs
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages for docs
        run: pnpm build

      - name: Build documentation
        run: pnpm docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
